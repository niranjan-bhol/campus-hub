<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Campus Hub Portal{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="logo">🎓</span>
                <span class="brand-name">Campus Hub</span>
            </div>
            <div class="nav-links">
                {% if session.user %}
                <span class="user-info">👤 {{ session.user.name }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
                {% else %}
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Home</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Campus Hub Portal. All rights reserved.</p>
        </div>
    </footer>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
